<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ 我要成为英语大师</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff5f8;
      --bg2: #ffffff;
      --bg3: #fff0f4;
      --border: #ffb3c6;
      --text: #5c3d4e;
      --text2: #a07080;
      --text3: #c09aaa;
      --accent: #ff85a1;
      --accent-light: #ffb3c6;
      --accent-dim: rgba(255,133,161,0.12);
      --accent-deco: #ffd6e0;
      --green: #5cb85c;
      --yellow: #ffaa00;
      --red: #ff6b7a;
      --tag-new: #ffe8f0;
      --tag-new-text: #ff85a1;
      --tag-mid: #fff3d6;
      --tag-mid-text: #ffaa00;
      --tag-done: #e8f8e8;
      --tag-done-text: #5cb85c;
      --radius: 24px;
      --radius-sm: 16px;
      --radius-xs: 12px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 24px 24px 16px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      background: linear-gradient(160deg, #fff0f5 0%, #fff5f8 100%);
      position: relative;
    }
    .header::before {
      content: '✦ ✦ ✦';
      color: var(--accent-light);
      font-size: 11px;
      display: block;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 6px;
    }
    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 26px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.5px;
      text-align: center;
    }
    .header h1 span { color: var(--accent); }
    .header p {
      font-size: 12px;
      color: var(--accent-light);
      margin-top: 4px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 24px 0;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      justify-content: center;
    }
    .tab-btn {
      padding: 8px 20px;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.1s;
    }
    .tab-btn:hover { background: var(--accent-deco); transform: scale(1.04); }
    .tab-btn.active {
      background: linear-gradient(135deg, #ff85a1, #ffb3c6);
      color: #fff;
      box-shadow: 0 4px 12px rgba(255,133,161,0.35);
    }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 20px 24px 48px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Section title ── */
    .section-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    /* ── Card ── */
    .card {
      background: var(--bg2);
      border: 2px dashed var(--accent-light);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(255,133,161,0.12);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      box-shadow: 0 8px 28px rgba(255,133,161,0.2);
      transform: translateY(-2px);
    }
    .card:last-child { margin-bottom: 0; }

    /* ── Word card (today) ── */
    .word-main {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .word-main h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 26px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .phonetic {
      font-size: 13px;
      color: var(--accent);
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
    }
    .speak-btn {
      background: linear-gradient(135deg, #ff85a1, #ffb3c6);
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 999px;
      transition: transform 0.15s, box-shadow 0.15s;
      line-height: 1;
      box-shadow: 0 2px 8px rgba(255,133,161,0.3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .speak-btn:hover {
      transform: scale(1.15);
      box-shadow: 0 4px 14px rgba(255,133,161,0.45);
    }
    .speak-btn:active { transform: scale(0.92); }
    .speak-example { font-size: 11px; vertical-align: middle; margin-left: 4px; }
    .speak-inline  { font-size: 11px; vertical-align: middle; margin-left: 6px; }
    .speak-quiz    {
      display: block;
      margin: 8px auto 0;
      font-size: 16px;
      opacity: 0.8;
    }
    .speak-quiz:hover { transform: scale(1.2); }
    .chinese-meaning {
      font-size: 15px;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .meta-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .meta-item {
      display: flex;
      gap: 8px;
      font-size: 13px;
    }
    .meta-label {
      color: var(--text3);
      white-space: nowrap;
      min-width: 36px;
      font-weight: 700;
    }
    .meta-value { color: var(--text2); line-height: 1.6; font-weight: 600; }
    .example-text {
      color: var(--text);
      font-style: italic;
      background: #fff0f5;
      border-left: 3px solid var(--accent);
      padding: 8px 14px;
      border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
      line-height: 1.7;
      margin-top: 2px;
      font-weight: 600;
    }

    /* ── Status tag ── */
    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .status-tag.new { background: var(--tag-new); color: var(--tag-new-text); }
    .status-tag.learning { background: var(--tag-mid); color: var(--tag-mid-text); }
    .status-tag.mastered { background: var(--tag-done); color: var(--tag-done-text); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      letter-spacing: 0.2px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
      background: linear-gradient(135deg, #ff85a1, #ffb3c6);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255,133,161,0.4), 0 2px 0 #e06080;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,133,161,0.5); }
    .btn-ghost {
      background: var(--bg3);
      color: var(--accent);
      border: 2px solid var(--accent-light);
    }
    .btn-ghost:hover { background: var(--accent-deco); }
    .btn-know {
      background: #e8f8e8;
      color: #3d8b3d;
      border-bottom: 3px solid #a8d8a8;
    }
    .btn-know:hover { background: #d4f0d4; transform: translateY(-1px); }
    .btn-fuzzy {
      background: #fff8e0;
      color: #c47a00;
      border-bottom: 3px solid #ffd080;
    }
    .btn-fuzzy:hover { background: #fff0c0; transform: translateY(-1px); }
    .btn-nope {
      background: #ffe8ec;
      color: #c0304a;
      border-bottom: 3px solid #ffb3be;
    }
    .btn-nope:hover { background: #ffd0d8; transform: translateY(-1px); }

    /* ── Today header row ── */
    .today-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .today-count {
      font-size: 13px;
      color: var(--text2);
      font-weight: 700;
    }
    .today-count strong { color: var(--accent); }

    /* ── Quiz ── */
    #quiz-container {
      display: none;
    }
    .quiz-progress {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 16px;
      font-weight: 700;
      text-align: center;
    }
    .quiz-progress span { color: var(--accent); font-weight: 800; }
    .quiz-card {
      background: var(--bg2);
      border: 2px solid var(--accent-deco);
      border-radius: var(--radius);
      padding: 36px 28px;
      text-align: center;
      margin-bottom: 16px;
      box-shadow: 0 6px 28px rgba(255,133,161,0.15);
    }
    .quiz-word {
      font-family: 'Fredoka One', cursive;
      font-size: 42px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .quiz-hint {
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 20px;
      font-weight: 600;
    }
    .quiz-reveal {
      background: #fff0f5;
      border-radius: var(--radius-sm);
      padding: 18px;
      margin-bottom: 20px;
      text-align: left;
      display: none;
      border: 1px solid var(--accent-deco);
    }
    .quiz-reveal.shown { display: block; }
    .quiz-reveal .chinese-meaning { margin-bottom: 10px; }
    .quiz-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .quiz-show-btn {
      margin-bottom: 16px;
    }
    .quiz-result {
      background: var(--bg2);
      border: 2px dashed var(--accent-light);
      border-radius: var(--radius);
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(255,133,161,0.12);
    }
    .quiz-result h3 {
      font-family: 'Fredoka One', cursive;
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--accent);
    }
    .quiz-result p { font-size: 14px; color: var(--text2); margin-bottom: 24px; font-weight: 700; }
    .result-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 28px;
    }
    .result-stat { text-align: center; }
    .result-stat .num { font-family: 'Fredoka One', cursive; font-size: 36px; font-weight: 400; }
    .result-stat .label { font-size: 12px; color: var(--text2); margin-top: 2px; font-weight: 700; }
    .num.know { color: var(--green); }
    .num.fuzzy { color: var(--yellow); }
    .num.nope { color: var(--red); }

    /* ── Vocab library ── */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 160px;
      padding: 10px 18px;
      background: var(--bg2);
      border: 2px solid var(--accent-deco);
      border-radius: 999px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,133,161,0.15);
    }
    .filter-btns { display: flex; gap: 6px; }
    .filter-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: 2px solid var(--accent-deco);
      background: var(--bg2);
      color: var(--text2);
      font-size: 13px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .filter-btn:hover { background: var(--accent-deco); }
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .vocab-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg2);
      border: 2px solid var(--accent-deco);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      gap: 12px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .vocab-list-item:hover {
      border-color: var(--accent-light);
      background: #fff8fa;
      transform: translateX(2px);
    }
    .vocab-list-left { flex: 1; min-width: 0; }
    .vocab-list-word {
      font-family: 'Fredoka One', cursive;
      font-size: 17px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vocab-list-cn {
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }
    .vocab-list-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }
    .vocab-date { font-size: 11px; color: var(--text3); font-weight: 600; }
    .vocab-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text3);
      font-size: 14px;
      font-weight: 600;
    }

    /* ── Progress ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--bg2);
      border: 2px solid var(--accent-deco);
      border-radius: var(--radius-sm);
      padding: 18px 12px;
      text-align: center;
      box-shadow: 0 3px 14px rgba(255,133,161,0.1);
      transition: transform 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .num {
      font-family: 'Fredoka One', cursive;
      font-size: 36px;
      font-weight: 400;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 5px;
    }
    .stat-card .label { font-size: 12px; color: var(--text2); font-weight: 700; }
    .chart-wrap {
      background: var(--bg2);
      border: 2px solid var(--accent-deco);
      border-radius: var(--radius-sm);
      padding: 22px;
      margin-bottom: 20px;
      box-shadow: 0 3px 14px rgba(255,133,161,0.08);
    }
    .chart-wrap h3 {
      font-size: 14px;
      font-weight: 800;
      color: var(--text2);
      margin-bottom: 16px;
    }
    .chart-container { position: relative; height: 180px; }

    .recent-list { margin-top: 0; }
    .recent-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border: 2px solid var(--accent-deco);
      border-radius: var(--radius-xs);
      margin-bottom: 8px;
      font-size: 13px;
      transition: background 0.15s;
    }
    .recent-item:hover { background: #fff8fa; }
    .recent-word { color: var(--text); font-weight: 700; font-family: 'Nunito', sans-serif; }
    .recent-date { color: var(--text3); font-weight: 600; }

    /* ── Empty state ── */
    .empty-today {
      text-align: center;
      padding: 52px 20px;
      color: var(--text3);
    }
    .empty-today .emoji { font-size: 44px; margin-bottom: 14px; }
    .empty-today p { font-size: 14px; font-weight: 700; color: var(--text2); }

    /* ── Divider ── */
    .divider {
      height: 2px;
      background: var(--accent-deco);
      margin: 20px 0;
      border-radius: 1px;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--text3);
      font-size: 14px;
      font-weight: 700;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .header, .tabs, .content { padding-left: 16px; padding-right: 16px; }
      .quiz-word { font-size: 32px; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-card .num { font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>✦ 我要成为英语大师 ✦</h1>
  <p>✿ SM-2 间隔复习 · 个人词库 ✿</p>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="progress">🌟 进度</button>
  <button class="tab-btn" data-tab="today">🌸 今日</button>
  <button class="tab-btn" data-tab="library">📖 词汇库</button>
</div>

<div class="content">

  <!-- ═══ TODAY ═══ -->
  <div class="panel" id="panel-today">
    <div id="today-browse">
      <div style="text-align:center;padding:48px 24px 32px;">
        <div style="font-size:52px;margin-bottom:12px;">🌸</div>
        <div id="today-count" style="font-size:15px;color:var(--text2);margin-bottom:32px;font-family:'Nunito',sans-serif;"></div>
        <button class="btn btn-primary" id="btn-start-quiz" style="font-size:22px;padding:18px 56px;border-radius:999px;letter-spacing:1px;box-shadow:0 8px 28px rgba(255,133,161,0.45);">✦ 开始测验 ✦</button>
      </div>
    </div>

    <!-- Quiz UI -->
    <div id="quiz-container">
      <div id="quiz-body">
        <div class="quiz-progress">第 <span id="q-current">1</span> / <span id="q-total">3</span> 题</div>
        <div class="quiz-card">
          <div class="quiz-word" id="q-word"></div>
          <button class="speak-btn speak-quiz" id="btn-speak-quiz" onclick="speakQuizWord()" title="朗读">🔊</button>
          <div class="quiz-hint">点击查看释义 ✿</div>
          <button class="btn btn-ghost quiz-show-btn" id="btn-show-answer">查看释义</button>
          <div class="quiz-reveal" id="q-reveal">
            <div class="phonetic" id="q-phonetic" style="text-align:center;margin-bottom:6px;font-size:14px;"></div>
            <div class="chinese-meaning" id="q-cn"></div>
            <div class="meta-item" style="margin-top:12px;">
              <span class="meta-label">例句</span>
              <span class="meta-value example-text" id="q-example"></span>
              <span id="q-example-speak"></span>
            </div>
          </div>
          <div class="quiz-actions" id="quiz-actions" style="display:none">
            <button class="btn btn-know" id="btn-know">✓ 知道</button>
            <button class="btn btn-fuzzy" id="btn-fuzzy">~ 模糊</button>
            <button class="btn btn-nope" id="btn-nope">✕ 不知道</button>
          </div>
        </div>
      </div>
      <div id="quiz-result" class="quiz-result" style="display:none">
        <h3>测验完成 🎉</h3>
        <p>本次复习了 <strong id="res-total"></strong> 个词汇</p>
        <div class="result-stats">
          <div class="result-stat">
            <div class="num know" id="res-know">0</div>
            <div class="label">知道</div>
          </div>
          <div class="result-stat">
            <div class="num fuzzy" id="res-fuzzy">0</div>
            <div class="label">模糊</div>
          </div>
          <div class="result-stat">
            <div class="num nope" id="res-nope">0</div>
            <div class="label">不知道</div>
          </div>
        </div>
        <button class="btn btn-ghost" id="btn-quiz-done">返回今日词汇</button>
      </div>
    </div>
  </div>

  <!-- ═══ LIBRARY ═══ -->
  <div class="panel" id="panel-library">
    <div class="search-row">
      <input type="text" class="search-input" id="search-input" placeholder="🔍 搜索单词或释义…" />
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="new">🌱</button>
        <button class="filter-btn" data-filter="learning">🌿</button>
        <button class="filter-btn" data-filter="mastered">🌳</button>
      </div>
    </div>
    <div id="vocab-list"><div class="loading">加载中…</div></div>
  </div>

  <!-- ═══ PROGRESS ═══ -->
  <div class="panel active" id="panel-progress">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="num" id="stat-total">—</div>
        <div class="label">词汇总量</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:var(--tag-new-text)" id="stat-new">—</div>
        <div class="label">🌱 新学</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:var(--tag-mid-text)" id="stat-mid">—</div>
        <div class="label">🌿 练习中</div>
      </div>
    </div>
    <div class="stats-grid" style="grid-template-columns:1fr 1fr;">
      <div class="stat-card">
        <div class="num" style="color:var(--tag-done-text)" id="stat-done">—</div>
        <div class="label">🌳 已掌握</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-reviewed" style="color:var(--accent)">—</div>
        <div class="label">本周复习</div>
      </div>
    </div>

    <div class="chart-wrap">
      <h3>✦ 词汇状态分布</h3>
      <div class="chart-container">
        <canvas id="statusChart"></canvas>
      </div>
    </div>

    <div class="chart-wrap" style="margin-top:20px;">
      <h3>✦ 记忆曲线（复习间隔分布）</h3>
      <div class="chart-container">
        <canvas id="memoryChart"></canvas>
      </div>
    </div>

    <div class="section-title">最近加入 ✿</div>
    <div class="recent-list" id="recent-list"><div class="loading">加载中…</div></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  STORAGE KEY
// ═══════════════════════════════════════════
const LS_KEY = 'vocab_data_v1';

// ═══════════════════════════════════════════
//  SM-2 ALGORITHM
// ═══════════════════════════════════════════
// ── Speech (TTS) ──
// ── Audio playback (预生成 mp3) ──
let currentAudio = null;

function playAudio(url) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const a = new Audio(url);
  currentAudio = a;
  a.play().catch(e => console.warn('播放失败:', e));
}

function speakWord(i) {
  const w = todayWords[i];
  if (!w) return;
  if (w.audio_word) {
    playAudio(w.audio_word);
  }
}

function speakText(audioUrl) {
  // audioUrl 现在直接是音频路径
  if (audioUrl && (audioUrl.endsWith('.mp3') || audioUrl.startsWith('audio/'))) {
    playAudio(audioUrl);
  }
}

function speakQuizWord() {
  const w = todayWords[quizIndex];
  if (!w) return;
  if (w.audio_word) playAudio(w.audio_word);
}

function speakLib(audioUrl) {
  if (audioUrl) playAudio(audioUrl);
}

function sm2Update(word, quality) {
  // quality: 0=不知道, 3=模糊, 5=知道
  let ef = word.sm2_easiness;
  let interval = word.sm2_interval;
  let reps = word.sm2_reps;

  if (quality >= 3) {
    if (reps === 0) interval = 1;
    else if (reps === 1) interval = 6;
    else interval = Math.round(interval * ef);
    reps += 1;
  } else {
    reps = 0;
    interval = 1;
  }

  ef = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  if (ef < 1.3) ef = 1.3;

  const nextReview = new Date();
  nextReview.setDate(nextReview.getDate() + interval);

  let status = 'new';
  if (reps >= 5) status = 'mastered';
  else if (reps >= 2) status = 'learning';

  return {
    sm2_easiness: Math.round(ef * 100) / 100,
    sm2_interval: interval,
    sm2_reps: reps,
    next_review: nextReview.toISOString().split('T')[0],
    status
  };
}

// ═══════════════════════════════════════════
//  DATA LAYER  (localStorage → vocab.json)
// ═══════════════════════════════════════════
let VOCAB_DATA = [];   // live working copy
let quizAnswers = [];  // [{wordIndex, quality}] accumulated during a quiz session

function loadData() {
  const stored = localStorage.getItem(LS_KEY);
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      // Merge: if vocab.json has newer entries, they won't be in localStorage.
      // Strategy: localStorage is authoritative for known words (by word key);
      // vocab.json words not present in localStorage are appended fresh.
      return Promise.resolve(parsed.words || parsed);
    } catch(e) { /* fall through to fetch */ }
  }
  return fetch('./vocab.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      // Normalise: ensure review_history exists on every word
      const words = (data.words || data).map(w => ({
        review_history: [],
        ...w
      }));
      saveToLocalStorage(words);
      return words;
    });
}

function saveToLocalStorage(words) {
  localStorage.setItem(LS_KEY, JSON.stringify({ words, saved_at: new Date().toISOString() }));
}

// Merge fresh vocab.json into existing localStorage data
// - 新词直接追加
// - 已有词：把 remote 的非学习进度字段（audio、phonetic、example等）同步进来
function mergeRemote(localWords, remoteWords) {
  const PROGRESS_KEYS = new Set(['status','sm2_interval','sm2_easiness','sm2_reps','next_review','review_history']);
  const remoteMap = new Map(remoteWords.map(w => [w.word.toLowerCase(), w]));
  
  const merged = localWords.map(local => {
    const remote = remoteMap.get(local.word.toLowerCase());
    if (!remote) return local;
    // 保留本地学习进度，但更新 remote 的内容字段（audio、phonetic 等）
    const updated = { ...local };
    for (const [k, v] of Object.entries(remote)) {
      if (!PROGRESS_KEYS.has(k)) updated[k] = v;
    }
    return updated;
  });

  // 追加新词
  const localKeys = new Set(localWords.map(w => w.word.toLowerCase()));
  const newWords = remoteWords
    .filter(w => !localKeys.has(w.word.toLowerCase()))
    .map(w => ({ review_history: [], ...w }));

  return [...merged, ...newWords];
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function statusLabel(s) {
  if (s === 'new')      return { emoji: '🌱', text: '新学',   cls: 'new' };
  if (s === 'learning') return { emoji: '🌿', text: '练习中', cls: 'learning' };
  return                       { emoji: '🌳', text: '已掌握', cls: 'mastered' };
}

function statusTagHTML(s) {
  const l = statusLabel(s);
  return `<span class="status-tag ${l.cls}">${l.emoji} ${l.text}</span>`;
}

function fmtDate(d) { return d || '—'; }

function weekAgo() {
  const d = new Date();
  d.setDate(d.getDate() - 7);
  return d.toISOString().slice(0, 10);
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

// ═══════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ═══════════════════════════════════════════
//  TODAY TAB
// ═══════════════════════════════════════════
let todayWords = [];

function renderToday() {
  const today = todayStr();
  // Show words due today or overdue (next_review <= today) OR status=new
  todayWords = VOCAB_DATA.filter(w =>
    w.status === 'new' || (w.next_review && w.next_review <= today)
  );

  const countEl = document.getElementById('today-count');

  if (todayWords.length === 0) {
    countEl.innerHTML = '今天没有需要复习的词 🎉';
    return;
  }

  countEl.innerHTML = `今日待复习 <strong style="color:var(--accent)">${todayWords.length}</strong> 个词`;

  container.innerHTML = todayWords.map((w, i) => `
    <div class="card">
      <div class="word-main">
        <h2>${w.word}</h2>
        ${w.phonetic ? `<span class="phonetic">${w.phonetic}</span>` : ''}
        ${w.audio_word ? `<button class="speak-btn" onclick="speakWord(${i})" title="朗读单词">🔊</button>` : ''}
      </div>
      <div class="chinese-meaning">${w.chinese}</div>
      <div class="meta-row">
        <div class="meta-item">
          <span class="meta-label">场景</span>
          <span class="meta-value">${w.scene}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">例句</span>
          <span class="meta-value example-text">${w.example}
            ${w.audio_example ? `<button class="speak-btn speak-example" onclick="speakText('${w.audio_example}')" title="朗读例句">🔊</button>` : ''}
          </span>
        </div>
      </div>
    </div>
  `).join('');
}

// ── Quiz logic ──
let quizIndex   = 0;
let quizResults = { know: 0, fuzzy: 0, nope: 0 };
let quizLog     = [];   // [{wordIndex (in VOCAB_DATA), quality}]

document.getElementById('btn-start-quiz').addEventListener('click', startQuiz);

function startQuiz() {
  document.getElementById('today-browse').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'block';
  quizIndex = 0;
  quizResults = { know: 0, fuzzy: 0, nope: 0 };
  quizLog = [];
  showQuizQuestion();
}

function showQuizQuestion() {
  const body   = document.getElementById('quiz-body');
  const result = document.getElementById('quiz-result');
  body.style.display   = 'block';
  result.style.display = 'none';

  const w = todayWords[quizIndex];
  document.getElementById('q-current').textContent = quizIndex + 1;
  document.getElementById('q-total').textContent   = todayWords.length;
  document.getElementById('q-word').textContent    = w.word;
  document.getElementById('q-phonetic').textContent = w.phonetic || '';
  document.getElementById('q-cn').textContent      = w.chinese;
  document.getElementById('q-example').textContent = w.example;
  // 例句朗读按钮
  const exSpeak = document.getElementById('q-example-speak');
  exSpeak.innerHTML = w.audio_example
    ? `<button class="speak-btn speak-example" onclick="playAudio('${w.audio_example}')" title="朗读例句">🔊</button>`
    : '';
  document.getElementById('q-reveal').classList.remove('shown');
  document.getElementById('quiz-actions').style.display  = 'none';
  document.getElementById('btn-show-answer').style.display = 'inline-flex';

  // 自动播放单词语音
  if (w.audio_word) {
    setTimeout(() => playAudio(w.audio_word), 300);
  }
}

document.getElementById('btn-show-answer').addEventListener('click', () => {
  document.getElementById('q-reveal').classList.add('shown');
  document.getElementById('quiz-actions').style.display  = 'flex';
  document.getElementById('btn-show-answer').style.display = 'none';
});

function recordAnswer(quality) {
  if (quality === 5) quizResults.know++;
  else if (quality === 3) quizResults.fuzzy++;
  else quizResults.nope++;

  quizLog.push({ word: todayWords[quizIndex], quality });
  quizIndex++;

  if (quizIndex < todayWords.length) {
    showQuizQuestion();
  } else {
    applyQuizResults();
    showQuizResult();
  }
}

document.getElementById('btn-know').addEventListener('click',  () => recordAnswer(5));
document.getElementById('btn-fuzzy').addEventListener('click', () => recordAnswer(3));
document.getElementById('btn-nope').addEventListener('click',  () => recordAnswer(0));

function applyQuizResults() {
  const today = todayStr();

  quizLog.forEach(({ word, quality }) => {
    // Find the word in VOCAB_DATA by reference match (word string)
    const idx = VOCAB_DATA.findIndex(w => w.word === word.word);
    if (idx === -1) return;

    const updates = sm2Update(VOCAB_DATA[idx], quality);
    const historyEntry = {
      date: today,
      quality,
      interval: updates.sm2_interval,
    };

    VOCAB_DATA[idx] = {
      ...VOCAB_DATA[idx],
      ...updates,
      review_history: [...(VOCAB_DATA[idx].review_history || []), historyEntry]
    };
  });

  // Persist to localStorage
  saveToLocalStorage(VOCAB_DATA);
}

function showQuizResult() {
  document.getElementById('quiz-body').style.display = 'none';
  const result = document.getElementById('quiz-result');
  result.style.display = 'block';
  document.getElementById('res-total').textContent = todayWords.length;
  document.getElementById('res-know').textContent  = quizResults.know;
  document.getElementById('res-fuzzy').textContent = quizResults.fuzzy;
  document.getElementById('res-nope').textContent  = quizResults.nope;
}

document.getElementById('btn-quiz-done').addEventListener('click', () => {
  document.getElementById('quiz-container').style.display  = 'none';
  document.getElementById('today-browse').style.display = 'block';
  // Re-render with updated data
  renderToday();
  renderProgress();
});

// ═══════════════════════════════════════════
//  LIBRARY TAB
// ═══════════════════════════════════════════
let currentFilter = 'all';
let currentSearch = '';

function renderLibrary() {
  const list = document.getElementById('vocab-list');
  let items = VOCAB_DATA;

  if (currentFilter !== 'all') {
    items = items.filter(w => w.status === currentFilter);
  }
  if (currentSearch.trim()) {
    const q = currentSearch.trim().toLowerCase();
    items = items.filter(w =>
      w.word.toLowerCase().includes(q) ||
      w.chinese.toLowerCase().includes(q)
    );
  }

  if (items.length === 0) {
    list.innerHTML = `<div class="vocab-empty">没有找到匹配的词汇 🌸</div>`;
    return;
  }

  list.innerHTML = items.map(w => `
    <div class="vocab-list-item">
      <div class="vocab-list-left">
        <div class="vocab-list-word">
          ${w.word}
          ${w.audio_word ? `<button class="speak-btn speak-inline" onclick="speakLib('${w.audio_word}')" title="朗读">🔊</button>` : ''}
        </div>
        <div class="vocab-list-cn">${w.chinese}</div>
      </div>
      <div class="vocab-list-right">
        ${statusTagHTML(w.status)}
        <span class="vocab-date">${fmtDate(w.added)}</span>
      </div>
    </div>
  `).join('');
}

document.getElementById('search-input').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderLibrary();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderLibrary();
  });
});

// ═══════════════════════════════════════════
//  PROGRESS TAB
// ═══════════════════════════════════════════
let chartInstance = null;

function renderProgress() {
  const total      = VOCAB_DATA.length;
  const newCount   = VOCAB_DATA.filter(w => w.status === 'new').length;
  const midCount   = VOCAB_DATA.filter(w => w.status === 'learning').length;
  const doneCount  = VOCAB_DATA.filter(w => w.status === 'mastered').length;
  const weekAgoStr = weekAgo();
  const reviewed   = VOCAB_DATA.filter(w => w.next_review && w.next_review >= weekAgoStr).length;

  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-new').textContent      = newCount;
  document.getElementById('stat-mid').textContent      = midCount;
  document.getElementById('stat-done').textContent     = doneCount;
  document.getElementById('stat-reviewed').textContent = reviewed;

  // Chart — destroy previous instance if exists
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const ctx = document.getElementById('statusChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['🌱 新学', '🌿 练习中', '🌳 已掌握'],
      datasets: [{
        data: [newCount, midCount, doneCount],
        backgroundColor: ['#ffe8f0', '#fff3d6', '#e8f8e8'],
        borderColor: ['#ff85a1', '#ffaa00', '#5cb85c'],
        borderWidth: 2,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: {
            color: '#a07080',
            font: { size: 13, family: 'Nunito', weight: '700' },
            padding: 16,
            boxWidth: 12,
            boxHeight: 12
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.parsed} 个 (${total ? Math.round(ctx.parsed / total * 100) : 0}%)`
          }
        }
      },
      cutout: '65%'
    }
  });

  // 记忆曲线图（复习间隔分布）
  if (window._memoryChart) { window._memoryChart.destroy(); window._memoryChart = null; }
  const intervals = { '今天': 0, '1-3天': 0, '4-7天': 0, '8-21天': 0, '21天+': 0 };
  const today = new Date().toISOString().split('T')[0];
  VOCAB_DATA.forEach(w => {
    const diff = w.next_review
      ? Math.max(0, Math.round((new Date(w.next_review) - new Date(today)) / 86400000))
      : 0;
    if (diff === 0) intervals['今天']++;
    else if (diff <= 3) intervals['1-3天']++;
    else if (diff <= 7) intervals['4-7天']++;
    else if (diff <= 21) intervals['8-21天']++;
    else intervals['21天+']++;
  });
  const mctx = document.getElementById('memoryChart').getContext('2d');
  window._memoryChart = new Chart(mctx, {
    type: 'bar',
    data: {
      labels: Object.keys(intervals),
      datasets: [{
        label: '词汇数量',
        data: Object.values(intervals),
        backgroundColor: ['#ffb3c6','#ffd6e0','#ffaac8','#ff85a1','#e8629a'],
        borderRadius: 10,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} 个词` } }
      },
      scales: {
        x: { ticks: { color: '#a07080', font: { family: 'Nunito', size: 12 } }, grid: { display: false } },
        y: { ticks: { color: '#a07080', font: { family: 'Nunito', size: 12 } }, grid: { color: '#ffe0eb' } }
      }
    }
  });

  // Recent
  const recent = [...VOCAB_DATA]
    .sort((a, b) => (b.added || '').localeCompare(a.added || ''))
    .slice(0, 5);

  document.getElementById('recent-list').innerHTML = recent.map(w => `
    <div class="recent-item">
      <span class="recent-word">${w.word} <span style="color:var(--text2);font-weight:600">${w.chinese}</span></span>
      <span class="recent-date">${fmtDate(w.added)}</span>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════
//  BOOT — load data then render everything
// ═══════════════════════════════════════════
loadData().then(localWords => {
  // Also try to fetch vocab.json to pick up any new words added by sync.py
  return fetch('./vocab.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      const remoteWords = (data.words || data).map(w => ({ review_history: [], ...w }));
      const merged = mergeRemote(localWords, remoteWords);
      if (merged.length > localWords.length) {
        saveToLocalStorage(merged);
      }
      return merged;
    })
    .catch(() => localWords);  // offline/CORS → use local only
}).then(words => {
  VOCAB_DATA = words;
  renderToday();
  renderLibrary();
  renderProgress();
}).catch(err => {
  console.error('Failed to load vocab data:', err);
  document.getElementById('today-cards').innerHTML =
    '<div class="loading" style="color:#ff6b7a">加载失败，请确认 vocab.json 存在且服务器正在运行。</div>';
});
</script>
</body>
</html>
